<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Be Healthy | Marrakech</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f8f4ed;color:#333}
header{height:100vh;background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.55)),url('images/hero.jpg') center/cover;display:flex;align-items:center;justify-content:center;color:#fff;text-align:center}
h1{font-size:4rem;margin:0} .btn{display:inline-block;margin-top:20px;padding:15px 30px;background:#c89b3c;color:#fff;text-decoration:none;border-radius:30px}
section{max-width:1200px;margin:auto;padding:70px 20px}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.gallery img{width:100%;height:320px;object-fit:cover;border-radius:18px;transition:.4s;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.15)}
.gallery img:hover{transform:scale(1.04)}
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);justify-content:center;align-items:center;z-index:9999}
#lightbox img{max-width:90%;max-height:90%;border-radius:15px}
footer{background:#0f241e;color:#fff;text-align:center;padding:25px}
</style>
</head>
<body>
<header>
<div>
<h1>Be Healthy</h1>
<p>Hijama Thérapeutique • Marrakech • Maroc</p>
<a class="btn" href="tel:+212647932044">Prendre rendez-vous</a>
</div>
</header>

<section>
<h2 style="text-align:center">Galerie Premium</h2>
<div class="gallery">
<img src="images/gallery/1.jpg">
<img src="images/gallery/2.jpg">
<img src="images/gallery/3.jpg">
<img src="images/gallery/4.jpg">
<img src="images/gallery/5.jpg">
<img src="images/gallery/6.jpg">
<img src="images/gallery/7.jpg">
<img src="images/gallery/8.jpg">
</div>
</section>

<div id="lightbox" onclick="this.style.display='none'"><img id="lbimg"></div>

<footer>© 2026 Be Healthy - Marrakech</footer>

<script>
document.querySelectorAll('.gallery img').forEach(img=>{
 img.onclick=()=>{
  document.getElementById('lbimg').src=img.src;
  document.getElementById('lightbox').style.display='flex';
 }
});
</script>
</body>
</html>
